name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA
        run: |
          bubblewrap init --manifest https://myfocusday.netlify.app/manifest.json --directory ./twa-app
        env:
          BUBBLEWRAP_SKIP_JDK_CHECK: true

      - name: Build APK
        run: |
          cd twa-app
          bubblewrap build
        env:
          BUBBLEWRAP_SKIP_JDK_CHECK: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: focusday-apk
          path: ./twa-app/app-release-signed.apk
